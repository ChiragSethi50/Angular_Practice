<div class="counter container">
  <h2>Mini counter</h2>
  <h3>{{ count }}</h3>

  <div>
    <button class="btn bg-blue" (click)="handleCounter('decrement')">Decrement</button>
    <button class="btn bg-beige" (click)="handleCounter('reset')">Reset</button>
    <button class="btn bg-green" (click)="handleCounter('increment')">Increment</button>
  </div>
</div>
