<!-- {{ }}: Interpolation braces -->
<body>
  <div class="navebar" style="display: flex; justify-content: space-between">
    <h1>{{ title() }}</h1>
    <div style="display: flex; gap: 16px; align-items: center">
      <a
        routerLink="/"
        routerLinkActive="active-link"
        [routerLinkActiveOptions]="{ exact: true }"
        class="nav-link"
        >Home</a
      >
      <a routerLink="/about/{{ name }}" routerLinkActive="active-link" class="nav-link">About</a>
      <a
        routerLink="/profile"
        routerLinkActive="active-link"
        class="nav-link"
        [queryParams]="{ id: 1, name: 'Ace', age: 21 }"
        >Profile</a
      >

      <!-- Routing with Button -->
      <button class="btn" (click)="redirectToList()">To Do List</button>
    </div>
  </div>

  <router-outlet> </router-outlet>
</body>
